stages:
  - debug

variables:
  GIT_STRATEGY: none

default:
  tags:
    - docker
  image: "codebank.nexus.cloud.frb.org/cicd-executor-ps-az:2"

debug:
  stage: debug
  script:
    - echo "Checking PWSH exist version"
    - which pwsh || echo "pwsh not found"
    - pwsh -v || echo "pwsh not installed"
    - echo "Checking Azure CLI"
    - which az || echo "az cli not found"
    - echo "Installing dotnet using install script with fallback"; curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh && chmod +x dotnet-install.sh && ./dotnet-install.sh --channel 8.0 --install-dir $HOME/.dotnet && export PATH=$PATH:$HOME/.dotnet || (echo "Install script failed, trying tarball fallback" && curl -L https://dotnetcli.azureedge.net/dotnet/Sdk/8.0.100/dotnet-sdk-8.0.100-linux-x64.tar.gz -o dotnet.tar.gz && mkdir -p $HOME/.dotnet && tar -zxf dotnet.tar.gz -C $HOME/.dotnet && export PATH=$PATH:$HOME/.dotnet)
    - echo "Checking dotnet"
    - which dotnet || echo "dotnet not found"
    - dotnet --version || echo "dotnet install failed"
    - az --version || true
