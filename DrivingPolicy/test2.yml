stages:
  - debug

variables:
  HTTP_PROXY: "https://p1proxy6.frb.org.8080"
  HTTPS_PROXY: "https://p1proxy6.frb.org.8080"
  NO_PROXY: "localhost,127.0.0.1"

default:
  tags:
    - linux
    - docker

debug:
  stage: debug
  script:
    - echo "Proxy variables"
    - env | grep -i proxy
    - curl -I https://$CI_SERVER_HOST || echo "curl failed"
    - echo "Testing Nexus connectivity"
    - curl -I https://codebank-nexus.cloud.frb.org || echo "curl nexus failed"