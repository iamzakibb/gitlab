stages:
  - validate

validate_azure_connectivity:
  stage: validate
  script:
    - set -euo pipefail
    - echo "==== STEP 1: Checking required tools ===="
    - command -v dotnet >/dev/null 2>&1 || (echo "dotnet not installed" && exit 1)
    - command -v az >/dev/null 2>&1 || (echo "Azure CLI not installed" && exit 1)
    - command -v zip >/dev/null 2>&1 || (echo "zip not installed" && exit 1)
    - echo "dotnet version:"
    - dotnet --version
    - echo "Azure CLI version:"
    - az --version | head -n 1
    - echo "==== STEP 2: Logging into Azure ===="
    - az login --service-principal --username "$AZURE_CLIENT_ID" --password "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
    - echo "==== STEP 3: Setting subscription ===="
    - az account set --subscription "$AZURE_SUBSCRIPTION_ID"
    - echo "==== STEP 4: Verifying subscription access ===="
    - az account show --output table
    - echo "==== VALIDATION SUCCESSFUL ===="
